services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/astronomy_hub
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_PORT: ${FRONTEND_PORT:-4173}
      VITE_DEV_PROXY_TARGET: http://backend:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-4173}:${FRONTEND_PORT:-4173}"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:'+(process.env.FRONTEND_PORT||4173),res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

  stellarium-reference:
    build:
      context: ./study/stellarium-web-engine/source/stellarium-web-engine-master/apps/web-frontend
      dockerfile: Dockerfile
    command: >-
      sh -lc "node -e \"const fs=require('fs');const path='/app/package.json';const pkg=JSON.parse(fs.readFileSync(path,'utf8'));pkg.dependencies=pkg.dependencies||{};pkg.devDependencies=pkg.devDependencies||{};pkg.dependencies.vue='2.6.12';pkg.devDependencies['vue-template-compiler']='2.6.12';fs.writeFileSync(path, JSON.stringify(pkg, null, 2)+'\\n');\" && yarn install && ./node_modules/.bin/vue-cli-service serve --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
      - "8888:8888"
    volumes:
      - ./study/stellarium-web-engine/source/stellarium-web-engine-master/apps/web-frontend:/app
      - ./study/stellarium-web-engine/source/stellarium-web-engine-master/apps/test-skydata:/skydata
      - ./study/stellarium-web-engine/source/stellarium-web-engine-master/apps/test-skydata:/test-skydata
      - stellarium_reference_node_modules:/app/node_modules
    user: "0:0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:8080',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 10

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: astronomy_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  stellarium_reference_node_modules:
