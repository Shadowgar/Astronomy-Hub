name: Module 0 parity (G4)

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/src/features/sky-engine/engine/sky/**'
      - 'frontend/tests/test_module0*.test.js'
      - 'frontend/tests/test_module0*.test.ts'
      - 'frontend/tests/module0ReplayCases.ts'
      - 'frontend/tests/fixtures/module0_replay_astrom_goldens.json'
      - 'frontend/scripts/dumpModule0AstromGoldens.ts'
      - 'study/module0-parity/**'
      - '.github/workflows/module0-parity.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/src/features/sky-engine/engine/sky/**'
      - 'frontend/tests/test_module0*.test.js'
      - 'frontend/tests/test_module0*.test.ts'
      - 'frontend/tests/module0ReplayCases.ts'
      - 'frontend/tests/fixtures/module0_replay_astrom_goldens.json'
      - 'frontend/scripts/dumpModule0AstromGoldens.ts'
      - 'study/module0-parity/**'
      - '.github/workflows/module0-parity.yml'

jobs:
  module0-parity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: study/module0-parity/requirements.txt
      - name: PyERFA apco vs Hub fixture (BLK-002 second runtime)
        working-directory: study/module0-parity
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          python verify_apco_vs_hub.py
      - name: Module 0 deterministic replay + astrom golden contract
        run: npx vitest run tests/test_module0_deterministic_replay.test.js tests/test_module0_replay_astrom_golden_contract.test.js
