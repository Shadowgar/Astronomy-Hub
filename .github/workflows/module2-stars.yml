name: Module 2 stars-full (G6 partial)

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/src/features/sky-engine/engine/sky/adapters/bvToRgb.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/starsNuniq.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/ephCodec.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/fileTileRepository.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/healpix.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/hipGetPix.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/starsLookup.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/hipPixOrder2.generated.ts'
      - 'frontend/scripts/generate_hip_pix_order2.mjs'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/stellariumPainterLimits.ts'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/module2ParityFingerprint.ts'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/modules/StarsModule.ts'
      - 'frontend/src/features/sky-engine/engine/sky/index.ts'
      - 'frontend/src/features/sky-engine/SkyEngineScene.tsx'
      - 'frontend/src/features/sky-engine/starRenderer.ts'
      - 'frontend/tests/test_module2_bv_to_rgb.test.js'
      - 'frontend/tests/test_module2_stars_nuniq.test.js'
      - 'frontend/tests/test_module2_stars_render_limit.test.js'
      - 'frontend/tests/test_module2_hip_get_pix.test.js'
      - 'frontend/tests/test_module2_stars_lookup.test.js'
      - 'frontend/tests/test_module2_deterministic_replay.test.js'
      - 'frontend/tests/__snapshots__/test_module2_deterministic_replay.test.js.snap'
      - 'frontend/package.json'
      - '.github/workflows/module2-stars.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'frontend/src/features/sky-engine/engine/sky/adapters/bvToRgb.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/starsNuniq.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/ephCodec.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/fileTileRepository.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/healpix.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/hipGetPix.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/starsLookup.ts'
      - 'frontend/src/features/sky-engine/engine/sky/adapters/hipPixOrder2.generated.ts'
      - 'frontend/scripts/generate_hip_pix_order2.mjs'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/stellariumPainterLimits.ts'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/module2ParityFingerprint.ts'
      - 'frontend/src/features/sky-engine/engine/sky/runtime/modules/StarsModule.ts'
      - 'frontend/src/features/sky-engine/engine/sky/index.ts'
      - 'frontend/src/features/sky-engine/SkyEngineScene.tsx'
      - 'frontend/src/features/sky-engine/starRenderer.ts'
      - 'frontend/tests/test_module2_bv_to_rgb.test.js'
      - 'frontend/tests/test_module2_stars_nuniq.test.js'
      - 'frontend/tests/test_module2_stars_render_limit.test.js'
      - 'frontend/tests/test_module2_hip_get_pix.test.js'
      - 'frontend/tests/test_module2_stars_lookup.test.js'
      - 'frontend/tests/test_module2_deterministic_replay.test.js'
      - 'frontend/tests/__snapshots__/test_module2_deterministic_replay.test.js.snap'
      - 'frontend/package.json'
      - '.github/workflows/module2-stars.yml'

jobs:
  module2-stars:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck + build + module2 regression tests
        run: npm run typecheck && npm run build && npm run test:module2
