# CONTEXT MANIFEST — ASTRONOMY HUB (AUTHORITATIVE)

# This file defines EXACT document loading rules.
# This file CONTROLS execution behavior.
# No document outside this manifest may be loaded unless explicitly approved.

# CORE REQUIREMENT (NON-NEGOTIABLE)
# ALL tasks MUST load:
# - CORE_CONTEXT.md
# - LIVE_SESSION_BRIEF.md

global:
  always:
  - docs/context/CORE_CONTEXT.md
  - docs/context/LIVE_SESSION_BRIEF.md
  - docs/execution/STATE_TRANSITIONS.md

tasks:

  # ----------------------------------------
  # DOCUMENT RECONCILIATION / SYSTEM WORK
  # ----------------------------------------
  docs_change:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md

    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md

    - docs/DOCUMENT_INDEX.md
    - docs/execution/MASTER_PLAN.md
    - docs/execution/PROJECT_STATE.md

  # ----------------------------------------
  # BACKEND WORK (FUTURE — PHASE CONTROLLED)
  # ----------------------------------------
  backend_change:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md

    - docs/validation/SYSTEM_VALIDATION_SPEC.md

    - docs/architecture/ARCHITECTURE_OVERVIEW.md
    - docs/architecture/ENGINE_SPEC.md
    - docs/architecture/INGESTION_STRATEGY.md
    - docs/architecture/DATA_CONTRACTS.md

    - docs/execution/STACK_OVERVIEW.md
    - docs/execution/env_setup.md

    - docs/execution/backend/PHASE_BE_EXECUTION.md

  # ----------------------------------------
  # FRONTEND WORK (FUTURE — PHASE CONTROLLED)
  # ----------------------------------------
  frontend_change:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md

    - docs/validation/SYSTEM_VALIDATION_SPEC.md

    - docs/architecture/ARCHITECTURE_OVERVIEW.md
    - docs/architecture/DATA_CONTRACTS.md

    - docs/execution/STACK_OVERVIEW.md

    - docs/execution/frontend/PHASE_FE_EXECUTION.md

  # ----------------------------------------
  # VALIDATION (PHASE VERIFICATION)
  # ----------------------------------------
  validation:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md

    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md

    - docs/phases/PHASE_1_SPEC.md
    - docs/phases/PHASE_1_ACCEPTANCE_CRITERIA.md
    - docs/phases/PHASE_1_BUILD_SEQUENCE.md

  # ----------------------------------------
  # DEBUG / REVIEW / RECONCILIATION / PLANNING
  # FAILURE PATTERNS ALLOWED HERE ONLY
  # ----------------------------------------
  debug:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md
    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md
    - docs/runtime/FAILURE_PATTERNS.md
    - docs/execution/PROJECT_STATE.md

  review:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md
    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md
    - docs/runtime/FAILURE_PATTERNS.md
    - docs/execution/PROJECT_STATE.md

  reconciliation:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md
    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md
    - docs/runtime/FAILURE_PATTERNS.md
    - docs/execution/PROJECT_STATE.md

  planning:
    load:
    - docs/context/CORE_CONTEXT.md
    - docs/context/LIVE_SESSION_BRIEF.md
    - docs/validation/SYSTEM_VALIDATION_SPEC.md
    - docs/enforcement/FAILURE_RECOVERY_PROTOCOL.md
    - docs/runtime/FAILURE_PATTERNS.md
    - docs/execution/PROJECT_STATE.md

# ----------------------------------------
# ENFORCEMENT RULES (NON-NEGOTIABLE)
# ----------------------------------------

rules:
- do_not_load_unlisted_documents: true
- do_not_scan_docs_directory: true
- must_declare_loaded_documents: true
- must_match_task_context: true

# ----------------------------------------
# FAILURE CONDITIONS (EXECUTION BLOCK)
# ----------------------------------------

failure_conditions:
- loading_docs_outside_manifest
- scanning_full_docs_directory
- missing_core_context
- missing_session_brief
- undeclared_context

# END
