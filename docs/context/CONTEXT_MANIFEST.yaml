rules:
- do_not_load_unlisted_documents: true
- must_declare_loaded_documents: true
- must_match_task_context: true
- architecture_must_precede_feature_execution: true
- core_context_and_live_session_brief_are_mandatory: true

failure_conditions:
- loading_docs_outside_manifest
- missing_core_context
- missing_session_brief
- undeclared_context
- executing_without_architecture_context
