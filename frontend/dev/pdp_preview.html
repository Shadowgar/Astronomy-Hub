<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Primary Decision Panel Preview</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif;padding:24px;background:#0d1117;color:#cfe8ff}
    .primary-decision-panel { display:flex; gap:24px; align-items:center; padding:22px; margin-bottom:18px; background:transparent; border-bottom:1px solid #30363d }
    .primary-decision-panel .pdp-left { min-width:140px; text-align:left }
    .primary-decision-panel .pdp-status { font-size:20px; font-weight:800; color:#58a6ff }
    .primary-decision-panel .pdp-center { flex:1 }
    .primary-decision-panel .pdp-center h2 { margin:0 0 6px 0; font-size:22px }
    .primary-decision-panel .pdp-summary { margin:6px 0 10px 0; color:#c9d6e7 }
    .primary-decision-panel .pdp-darkness { color:#9fb1c8 }
    .primary-decision-panel .pdp-right { min-width:260px; display:flex; flex-direction:column; gap:8px; align-items:flex-end }
    .primary-decision-panel .pdp-target-sentence { margin:0; color:#cfe8ff }
    .primary-decision-panel .pdp-cta { background:#2388ff; color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer }
    .primary-decision-panel .pdp-cta:hover { filter:brightness(0.95) }
  </style>
</head>
<body>
  <section class="primary-decision-panel">
    <div class="pdp-left">
      <div class="pdp-status">Tonight: GOOD</div>
    </div>

    <div class="pdp-center">
      <h2>Tonight’s Observing Plan</h2>
      <p class="pdp-summary">Clear skies near zenith; scattered cirrus to the west.</p>
      <div class="pdp-darkness"><strong>Best window:</strong> 8:12 PM – 11:44 PM</div>
    </div>

    <div class="pdp-right">
      <div class="pdp-top-target">
        <p class="pdp-target-sentence">Start with M31 in the west</p>
      </div>

      <button class="pdp-cta">Show Me What To Look At</button>
    </div>
  </section>
</body>
</html>
